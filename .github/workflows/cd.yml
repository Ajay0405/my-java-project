name: Myjava1 CD

on:
  workflow_run:
    workflows: ["HelloWorld CI"]
    types:
      - completed

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker Image Tag"
        required: true
        default: "3"
        type: string

env:
  IMAGE_NAME: ajaygangarapu/my-java-app

jobs:
  deploy:
    runs-on: self-hosted

    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Cluster
        shell: powershell
        run: |
          kubectl get nodes
          kubectl get ns

      - name: Set Image Tag
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "IMAGE_TAG=${{ github.event.inputs.image_tag }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          else {
            "IMAGE_TAG=3" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Deploy Kubernetes Manifests
        shell: powershell
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Update Deployment Image
        shell: powershell
        run: |
          kubectl set image deployment/java-app java-app=${env:IMAGE_NAME}:${env:IMAGE_TAG} -n dev

      - name: Wait for Rollout
        shell: powershell
        run: |
          kubectl rollout status deployment/java-app -n dev

      - name: Verify Deployment
        shell: powershell
        run: |
          kubectl get deployment -n dev
          kubectl get pods -n dev
          kubectl get svc -n dev