name: Java CD

on:
  workflow_run:
    workflows: ["Java CI"]
    types:
      - completed

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (default: latest)"
        required: false
        default: "latest"

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/my-java-app
  NAMESPACE: dev
  DEPLOYMENT_NAME: java-app
  CONTAINER_NAME: java-app

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on:
      - self-hosted
      - Windows
      - X64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Kubernetes Cluster
        shell: powershell
        run: |
          kubectl version --client
          kubectl get nodes
          kubectl get ns

      - name: Determine Image Tag
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> $env:GITHUB_ENV
          }
          else {
            echo "IMAGE_TAG=latest" >> $env:GITHUB_ENV
          }

      - name: Pull Docker Image
        shell: powershell
        run: |
          docker pull $env:IMAGE_NAME:$env:IMAGE_TAG

      - name: Deploy Kubernetes Manifests
        shell: powershell
        run: |
          kubectl apply -f k8s/

      - name: Update Deployment Image
        shell: powershell
        run: |
          kubectl set image deployment/$env:DEPLOYMENT_NAME `
            $env:CONTAINER_NAME=$env:IMAGE_NAME:$env:IMAGE_TAG `
            -n $env:NAMESPACE

      - name: Wait for Rollout
        shell: powershell
        run: |
          kubectl rollout status deployment/$env:DEPLOYMENT_NAME -n $env:NAMESPACE --timeout=180s

      - name: Verify Deployment
        shell: powershell
        run: |
          kubectl get deployments -n $env:NAMESPACE
          kubectl get pods -n $env:NAMESPACE
          kubectl get svc -n $env:NAMESPACE

      - name: Deployment Summary
        shell: powershell
        run: |
          Write-Host "=================================="
          Write-Host "Deployment Successful"
          Write-Host "Image: $env:IMAGE_NAME:$env:IMAGE_TAG"
          Write-Host "Namespace: $env:NAMESPACE"
          Write-Host "=================================="