name: Java CD

on:
  workflow_run:
    workflows: ["Java CI"]
    types:
      - completed

  workflow_dispatch:

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on:
      - self-hosted
      - Windows
      - X64

    env:
      NAMESPACE: dev
      DEPLOYMENT_NAME: java-app
      CONTAINER_NAME: java-app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Docker
        shell: powershell
        run: |
          docker version
          docker info

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Debug Docker Variables
        shell: powershell
        run: |
          Write-Host "Docker Username : ${{ secrets.DOCKER_USERNAME }}"
          Write-Host "Image : ${{ secrets.DOCKER_USERNAME }}/my-java-app:latest"

      - name: Pull Latest Docker Image
        shell: powershell
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/my-java-app:latest

      - name: Verify Minikube Cluster
        shell: powershell
        run: |
          minikube status
          kubectl get nodes

      - name: Deploy Kubernetes Manifests
        shell: powershell
        run: |
          kubectl apply -f k8s/

      - name: Update Deployment Image
        shell: powershell
        run: |
          kubectl set image deployment/$env:DEPLOYMENT_NAME `
          $env:CONTAINER_NAME=${{ secrets.DOCKER_USERNAME }}/my-java-app:latest `
          -n $env:NAMESPACE

      - name: Wait for Rollout
        shell: powershell
        run: |
          kubectl rollout status deployment/$env:DEPLOYMENT_NAME -n $env:NAMESPACE --timeout=180s

      - name: Verify Deployment
        shell: powershell
        run: |
          kubectl get deployment -n $env:NAMESPACE
          kubectl get pods -n $env:NAMESPACE
          kubectl get svc -n $env:NAMESPACE

      - name: Deployment Summary
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "====================================="
          Write-Host "Deployment Completed Successfully"
          Write-Host "Image      : ${{ secrets.DOCKER_USERNAME }}/my-java-app:latest"
          Write-Host "Namespace  : $env:NAMESPACE"
          Write-Host "====================================="