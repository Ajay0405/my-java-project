name: Java-Project CD

on:
  workflow_run:
    workflows:
      - "Java-Project CI"
    types:
      - completed

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker Image Tag"
        required: true
        default: "latest"
        type: string

env:
  IMAGE_NAME: ajaygangarapu/my-java-app

jobs:
  deploy:
    runs-on:
      - self-hosted
      - Windows
      - X64
      - ajay-runner-2

    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug Workspace
        shell: powershell
        run: |
          Write-Host "Workspace: $env:GITHUB_WORKSPACE"
          Get-Location
          Get-ChildItem
          Get-ChildItem $env:GITHUB_WORKSPACE
          Get-ChildItem $env:GITHUB_WORKSPACE\k8s

      - name: Verify Kubernetes Cluster
        shell: powershell
        run: |
          kubectl get nodes
          kubectl get ns

      - name: Set Image Tag
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "IMAGE_TAG=${{ github.event.inputs.image_tag }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          else {
            "IMAGE_TAG=${{ github.event.workflow_run.run_number }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Deploy Kubernetes Manifests
        shell: powershell
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yml

      - name: Update Deployment Image
        shell: powershell
        run: |
          kubectl set image deployment/java-app java-app=${env:IMAGE_NAME}:${env:IMAGE_TAG} -n dev

      - name: Wait for Rollout
        shell: powershell
        run: |
          kubectl rollout status deployment/java-app -n dev

      - name: Verify Deployment
        shell: powershell
        run: |
          kubectl get deployment -n dev
          kubectl get pods -n dev
          kubectl get svc -n dev