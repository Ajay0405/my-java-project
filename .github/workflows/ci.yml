name: Java CI

on:
  push:
    branches:
      - main
      - 'pbi-*'

  pull_request:
    branches:
      - main
      - 'pbi-*'

  workflow_dispatch:

jobs:
  build:
    runs-on:
      - self-hosted
      - Windows
      - X64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Setup Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.9

      - name: Verify Java and Maven
        shell: powershell
        run: |
          java -version
          mvn -version

      - name: Build Maven Project
        shell: powershell
        run: |
          mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        shell: powershell
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-java-app:latest .
          docker tag ${{ secrets.DOCKER_USERNAME }}/my-java-app:latest ${{ secrets.DOCKER_USERNAME }}/my-java-app:${{ github.run_number }}

      - name: Push Docker Images
        shell: powershell
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/my-java-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/my-java-app:${{ github.run_number }}